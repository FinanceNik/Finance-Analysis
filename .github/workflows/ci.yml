name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  lint-and-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check all Python files
        run: |
          python -c "
          import py_compile, glob, sys
          errors = []
          for f in sorted(glob.glob('*.py') + glob.glob('pages/*.py')):
              try:
                  py_compile.compile(f, doraise=True)
              except py_compile.PyCompileError as e:
                  errors.append(str(e))
          if errors:
              for e in errors: print(e)
              sys.exit(1)
          print(f'All {len(glob.glob(\"*.py\") + glob.glob(\"pages/*.py\"))} files pass syntax check')
          "

      - name: Verify page count
        run: |
          python -c "
          import glob
          pages = glob.glob('pages/page_*.py')
          print(f'Found {len(pages)} page modules')
          assert len(pages) >= 25, f'Expected 25+ pages, found {len(pages)}'
          "

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t finance-analysis .
